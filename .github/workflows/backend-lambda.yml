# Tests (Go), validación Docker en PR, y en push a main: push a ECR + update-function-code.
# Añadí filas al matrix cuando des un servicio de alta en Terraform (ecr_services + lambda_http_services).
name: Backend Lambda

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-lambda.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-lambda.yml"

# Ajustá si tu Terraform usa otros project/environment (debe coincidir con ECR y nombre de Lambda).
env:
  AWS_REGION: us-east-1
  LAMBDA_PROJECT: finexa-infra
  LAMBDA_ENV: mvp

jobs:
  test:
    name: Go test (all services)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.work
          cache-dependency-path: |
            backend/go.work.sum
            backend/services/ms-plaid/go.sum
            backend/services/service-b/go.sum
            backend/services/service-c/go.sum
            backend/pkg/apiresult/go.sum

      - name: make test-all
        run: make test-all

  build:
    name: Docker build (${{ matrix.service }})
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ms-plaid
            dockerfile: services/ms-plaid/Dockerfile.lambda
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: docker build
        run: |
          docker build --platform linux/amd64 --provenance=false --sbom=false \
            -f ${{ matrix.dockerfile }} \
            -t lambda-ci:${{ matrix.service }} \
            .

  deploy:
    name: Push ECR + Lambda (${{ matrix.service }})
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ms-plaid
            dockerfile: services/ms-plaid/Dockerfile.lambda
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # Credenciales del usuario IAM: Secrets AWS_ACCESS_KEY_ID y AWS_SECRET_ACCESS_KEY
      # (no uses Variables para la secret key: no son confidenciales).
      # Si usás credenciales STS, añadí aquí aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, push, update Lambda
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ env.LAMBDA_PROJECT }}-${{ env.LAMBDA_ENV }}-${{ matrix.service }}
          TAG_SHA: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 --provenance=false --sbom=false \
            -f ${{ matrix.dockerfile }} \
            -t "$REGISTRY/$REPO:$TAG_SHA" \
            -t "$REGISTRY/$REPO:latest" \
            .
          docker push "$REGISTRY/$REPO:$TAG_SHA"
          docker push "$REGISTRY/$REPO:latest"
          aws lambda update-function-code \
            --function-name "$LAMBDA_PROJECT-$LAMBDA_ENV-${{ matrix.service }}" \
            --image-uri "$REGISTRY/$REPO:$TAG_SHA"
