
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finexa
      POSTGRES_PASSWORD: finexa
      POSTGRES_DB: finexa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finexa"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-pipeline:
    build:
      context: ../ai-pipeline
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Pasa tus credenciales locales directamente al contenedor
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-us-east-2}
    volumes:
      # Útil para el desarrollo, auto refrecará si configuras reload en UVICORN
      - ../ai-pipeline:/app/pipeline

volumes:
  postgres_data:
