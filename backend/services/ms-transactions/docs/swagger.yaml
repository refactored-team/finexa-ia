info:
  contact: {}
  description: Movimientos financieros por usuario interno
  title: ms-transactions API
  version: 1.0.0
paths:
  /health:
    get:
      description: Comprueba que el proceso responde y que la base de datos acepta
        conexión
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-transactions_internal_models.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/finexa-ia_ms-transactions_internal_models.HealthResponse'
      summary: Health check
      tags:
      - health
  /v1/transactions:
    get:
      description: Listado paginado por usuario autenticado. Soporta filtros por rango
        de fecha y categoría. Excluye borradas lógicas por defecto.
      parameters:
      - description: Tamaño de página (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Offset paginación (default 0)
        in: query
        name: offset
        type: integer
      - description: RFC3339 inicio (posted_at >= from)
        in: query
        name: from
        type: string
      - description: RFC3339 fin (posted_at <= to)
        in: query
        name: to
        type: string
      - description: Filtro por categoría
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiresult.okEnvelope-array_finexa-ia_ms-transactions_internal_models_TransactionListItem'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Listar transacciones del usuario autenticado
      tags:
      - transactions
  /v1/transactions/{id}:
    get:
      description: Obtiene una transacción por id interno, aislada por usuario autenticado
        y excluyendo borradas lógicas.
      parameters:
      - description: ID interno
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiresult.okEnvelope-finexa-ia_ms-transactions_internal_models_TransactionListItem'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Detalle por id interno
      tags:
      - transactions
  /v1/transactions/analysis/latest:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiresult.okEnvelope-finexa-ia_ms-transactions_internal_models_TransactionAnalysis'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Último análisis agregado
      tags:
      - analysis
  /v1/transactions/by-transaction-id/{transaction_id}:
    get:
      description: Obtiene una transacción por transaction_id, aislada por usuario
        autenticado y excluyendo borradas lógicas.
      parameters:
      - description: transaction_id externo
        in: path
        name: transaction_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiresult.okEnvelope-finexa-ia_ms-transactions_internal_models_TransactionListItem'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Detalle por transaction_id
      tags:
      - transactions
  /v1/transactions/cash-flow/latest:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiresult.okEnvelope-finexa-ia_ms-transactions_internal_models_CashFlow'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Último cash flow
      tags:
      - cashflow
  /v1/transactions/insights:
    get:
      parameters:
      - description: Tamaño de página (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Offset paginación (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiresult.okEnvelope-array_finexa-ia_ms-transactions_internal_models_Insight'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Listar insights
      tags:
      - analysis
  /v1/transactions/pulse/latest:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiresult.okEnvelope-finexa-ia_ms-transactions_internal_models_Pulse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Último pulse
      tags:
      - pulse
  /v1/transactions/resilience-factors:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiresult.okEnvelope-array_finexa-ia_ms-transactions_internal_models_ResilienceFactor'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Listar factores de resiliencia
      tags:
      - resilience
  /v1/transactions/test-bedrock:
    post:
      description: Hace una llamada simple al ai-pipeline (FastAPI) para probar Bedrock
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Probar IA (Bedrock)
      tags:
      - ai
schemes:
- http
- https
swagger: "2.0"
