basePath: /
definitions:
  finexa-ia_ms-plaid_internal_models.CreatePlaidItemRequest:
    properties:
      access_token:
        type: string
      institution_id:
        type: string
      institution_name:
        type: string
      plaid_item_id:
        type: string
    type: object
  finexa-ia_ms-plaid_internal_models.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  finexa-ia_ms-plaid_internal_models.HealthResponse:
    properties:
      database:
        description: '"ok" cuando Ping a Postgres funciona'
        example: ok
        type: string
      status:
        example: ok
        type: string
    type: object
  finexa-ia_ms-plaid_internal_models.PlaidItemResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      institution_id:
        type: string
      institution_name:
        type: string
      plaid_item_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
info:
  contact: {}
  description: Microservicio Plaid. La identidad del usuario debe validarse en el
    API gateway; aquí se usa userId en la ruta.
  title: ms-plaid API
  version: 1.0.0
paths:
  /health:
    get:
      description: Comprueba que el proceso responde y que la base de datos acepta
        conexión
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.HealthResponse'
      summary: Health check
      tags:
      - health
  /v1/users/{userId}/plaid-items:
    get:
      description: Lista ítems activos (sin access_token en respuesta)
      parameters:
      - description: ID interno de usuario (FK)
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.PlaidItemResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
      summary: Listar ítems Plaid
      tags:
      - plaid-items
    post:
      consumes:
      - application/json
      parameters:
      - description: ID interno de usuario (FK)
        in: path
        name: userId
        required: true
        type: integer
      - description: Cuerpo
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.CreatePlaidItemRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.PlaidItemResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
      summary: Registrar ítem Plaid
      tags:
      - plaid-items
  /v1/users/{userId}/plaid-items/{plaidItemId}:
    delete:
      parameters:
      - description: ID interno de usuario (FK)
        in: path
        name: userId
        required: true
        type: integer
      - description: plaid_item_id de Plaid
        in: path
        name: plaidItemId
        required: true
        type: string
      responses:
        "204":
          description: No content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
      summary: Baja lógica de ítem Plaid
      tags:
      - plaid-items
    get:
      parameters:
      - description: ID interno de usuario (FK)
        in: path
        name: userId
        required: true
        type: integer
      - description: plaid_item_id de Plaid
        in: path
        name: plaidItemId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.PlaidItemResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
      summary: Obtener ítem Plaid
      tags:
      - plaid-items
schemes:
- http
- https
swagger: "2.0"
