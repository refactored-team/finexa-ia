basePath: /
definitions:
  finexa-ia_ms-plaid_internal_models.CreateLinkTokenBody:
    properties:
      redirect_uri:
        type: string
      webhook_url:
        type: string
    type: object
  finexa-ia_ms-plaid_internal_models.CreatePlaidItemRequest:
    properties:
      access_token:
        type: string
      institution_id:
        type: string
      institution_name:
        type: string
      plaid_item_id:
        type: string
    type: object
  finexa-ia_ms-plaid_internal_models.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  finexa-ia_ms-plaid_internal_models.HealthResponse:
    properties:
      database:
        description: '"ok" cuando Ping a Postgres funciona'
        example: ok
        type: string
      status:
        example: ok
        type: string
    type: object
  finexa-ia_ms-plaid_internal_models.LinkTokenErrorResponse:
    properties:
      message:
        type: string
      plaid:
        $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.PlaidAPIErrorInfo'
    type: object
  finexa-ia_ms-plaid_internal_models.LinkTokenResponse:
    properties:
      expiration:
        type: string
      link_token:
        type: string
      request_id:
        type: string
    type: object
  finexa-ia_ms-plaid_internal_models.PlaidAPIErrorInfo:
    properties:
      error_code:
        type: string
      error_message:
        type: string
      error_type:
        type: string
    type: object
  finexa-ia_ms-plaid_internal_models.PlaidItemResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      institution_id:
        type: string
      institution_name:
        type: string
      plaid_item_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
info:
  contact: {}
  description: 'Microservicio Plaid: una conexión activa por usuario. La identidad
    debe validarse en el API gateway; aquí se usa userId en la ruta.'
  title: ms-plaid API
  version: 1.0.0
paths:
  /health:
    get:
      description: Comprueba que el proceso responde y que la base de datos acepta
        conexión
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.HealthResponse'
      summary: Health check
      tags:
      - health
  /v1/users/{userId}/plaid-item:
    delete:
      parameters:
      - description: ID interno de usuario (FK)
        in: path
        name: userId
        required: true
        type: integer
      responses:
        "204":
          description: No content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
      summary: Desconectar Plaid (baja lógica)
      tags:
      - plaid-item
    get:
      description: Como máximo una conexión activa por usuario (sin access_token en
        respuesta)
      parameters:
      - description: ID interno de usuario (FK)
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.PlaidItemResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
      summary: Obtener conexión Plaid
      tags:
      - plaid-item
    post:
      consumes:
      - application/json
      parameters:
      - description: ID interno de usuario (FK)
        in: path
        name: userId
        required: true
        type: integer
      - description: Cuerpo
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.CreatePlaidItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.PlaidItemResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.ErrorResponse'
      summary: Registrar o actualizar conexión Plaid
      tags:
      - plaid-item
  /v1/users/{userId}/plaid/link-token:
    post:
      consumes:
      - application/json
      description: 'Inicializa una sesión Link: llama a Plaid y persiste metadatos
        (sin guardar el link_token).'
      parameters:
      - description: ID interno de usuario (FK)
        in: path
        name: userId
        required: true
        type: integer
      - description: Overrides opcionales (webhook, redirect)
        in: body
        name: body
        schema:
          $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.CreateLinkTokenBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.LinkTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.LinkTokenErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.LinkTokenErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.LinkTokenErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.LinkTokenErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/finexa-ia_ms-plaid_internal_models.LinkTokenErrorResponse'
      summary: Crear link token Plaid
      tags:
      - plaid-link
schemes:
- http
- https
swagger: "2.0"
