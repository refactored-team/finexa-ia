basePath: /
definitions:
  apiresult.ErrResult:
    properties:
      error:
        $ref: '#/definitions/apiresult.ErrorPayload'
      ok:
        type: boolean
    type: object
  apiresult.ErrorPayload:
    properties:
      code:
        type: string
      details:
        additionalProperties: {}
        type: object
      message:
        type: string
    type: object
  finexa-ia_ms-users_internal_models.HealthResponse:
    properties:
      database:
        description: '"ok" when Postgres Ping works'
        example: ok
        type: string
      status:
        example: ok
        type: string
    type: object
  finexa-ia_ms-users_internal_models.PatchUserEmailRequest:
    properties:
      email:
        example: jane@example.com
        type: string
    type: object
  finexa-ia_ms-users_internal_models.UpdateUserRequest:
    properties:
      cognito_sub:
        example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        type: string
      email:
        example: jane@example.com
        type: string
    type: object
  finexa-ia_ms-users_internal_models.UpsertUserRequest:
    properties:
      cognito_sub:
        example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        type: string
      email:
        example: jane@example.com
        type: string
    type: object
  finexa-ia_ms-users_internal_models.User:
    properties:
      cognito_sub:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      email:
        type: string
      id:
        type: integer
      updated_at:
        type: string
    type: object
  finexa-ia_ms-users_internal_models.UserListOKResult:
    properties:
      data:
        items:
          $ref: '#/definitions/finexa-ia_ms-users_internal_models.User'
        type: array
      ok:
        type: boolean
    type: object
  finexa-ia_ms-users_internal_models.UserListPage:
    properties:
      items:
        items:
          $ref: '#/definitions/finexa-ia_ms-users_internal_models.User'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  finexa-ia_ms-users_internal_models.UserListPageOKResult:
    properties:
      data:
        $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserListPage'
      ok:
        type: boolean
    type: object
  finexa-ia_ms-users_internal_models.UserOKResult:
    properties:
      data:
        $ref: '#/definitions/finexa-ia_ms-users_internal_models.User'
      ok:
        type: boolean
    type: object
info:
  contact: {}
  description: Usuarios internos (Cognito sub) en Postgres; misma BD que ms-plaid
    para FK.
  title: ms-users API
  version: 1.0.0
paths:
  /health:
    get:
      description: Comprueba que el proceso responde y que la base de datos acepta
        conexión
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.HealthResponse'
      summary: Health check
      tags:
      - health
  /v1/users:
    get:
      description: 'Paginación: limit (default 50, max 200), offset. Filtros: email
        (exacto, case-insensitive), created_from, created_to (RFC3339). include_deleted=true
        requiere token interno.'
      parameters:
      - description: Límite (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: Filtrar por email exacto (case-insensitive)
        in: query
        name: email
        type: string
      - description: Inicio rango created_at (RFC3339)
        in: query
        name: created_from
        type: string
      - description: Fin rango created_at (RFC3339)
        in: query
        name: created_to
        type: string
      - description: Incluir soft-deleted (requiere X-MS-Users-Internal-Token)
        in: query
        name: include_deleted
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserListPageOKResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Listar usuarios
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Upsert por cognito_sub; email opcional
      parameters:
      - description: Cuerpo
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/finexa-ia_ms-users_internal_models.UpsertUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserOKResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Registrar o actualizar usuario
      tags:
      - users
  /v1/users/{id}:
    delete:
      parameters:
      - description: ID interno
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserOKResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Eliminar usuario por id
      tags:
      - users
    get:
      parameters:
      - description: ID interno
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserOKResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Obtener usuario por id
      tags:
      - users
    patch:
      consumes:
      - application/json
      parameters:
      - description: ID interno
        in: path
        name: id
        required: true
        type: integer
      - description: Cuerpo (email null para borrar)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/finexa-ia_ms-users_internal_models.PatchUserEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserOKResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Actualizar email (PATCH)
      tags:
      - users
    put:
      consumes:
      - application/json
      parameters:
      - description: ID interno
        in: path
        name: id
        required: true
        type: integer
      - description: Cuerpo
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/finexa-ia_ms-users_internal_models.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserOKResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Actualizar usuario por id
      tags:
      - users
  /v1/users/{id}/hard:
    delete:
      parameters:
      - description: ID interno
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserOKResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Eliminar usuario permanentemente
      tags:
      - users
  /v1/users/{id}/restore:
    post:
      parameters:
      - description: ID interno
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserOKResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Restaurar usuario (soft-delete)
      tags:
      - users
  /v1/users/all:
    get:
      description: 'Misma forma que antes: { ok, data: []User }. Solo filas con deleted_at
        IS NULL.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserListOKResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Listar todos los usuarios activos
      tags:
      - users
  /v1/users/by-cognito:
    get:
      parameters:
      - description: Sub del JWT Cognito
        in: query
        name: cognito_sub
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserOKResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Obtener usuario por Cognito sub
      tags:
      - users
  /v1/users/by-email:
    get:
      parameters:
      - description: Email
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finexa-ia_ms-users_internal_models.UserOKResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apiresult.ErrResult'
      summary: Obtener usuario por email
      tags:
      - users
schemes:
- http
- https
swagger: "2.0"
